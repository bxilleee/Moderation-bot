<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Custom scrollbar for that 'Discord' look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2b2d31; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#1e1f22] text-gray-100 font-sans">
    
    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        
        <nav class="w-full md:w-64 bg-[#2b2d31] p-5 flex flex-row md:flex-col items-center md:items-start justify-between md:justify-start gap-4 border-b md:border-b-0 md:border-r border-[#1a1b1e]">
            <div class="text-xl font-bold text-indigo-400 flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white text-xs">🤖</div>
                <span class="hidden sm:inline">BotDash</span>
            </div>
            
            <div class="flex flex-row md:flex-col gap-2">
                <button onclick="showTab('builder')" class="p-2 md:w-full text-left rounded hover:bg-[#35373c] transition text-sm flex items-center gap-2">
                    <span>📝</span> <span class="hidden md:inline">Builder</span>
                </button>
                <button onclick="showTab('logs')" class="p-2 md:w-full text-left rounded hover:bg-[#35373c] transition text-sm flex items-center gap-2">
                    <span>💬</span> <span class="hidden md:inline">Live Feed</span>
                </button>
            </div>
        </nav>

        <main class="flex-1 overflow-y-auto p-4 md:p-10">
            
            <div id="builder" class="max-w-5xl mx-auto animate-in fade-in duration-500">
                <header class="mb-6">
                    <h2 class="text-2xl font-bold">Message Builder</h2>
                    <p class="text-gray-400 text-sm">Send messages to your server in real-time.</p>
                </header>

                <div class="flex flex-col lg:flex-row gap-6">
                    <div class="flex-1 space-y-4 bg-[#2b2d31] p-5 rounded-xl shadow-2xl">
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Select Channel</label>
                            <select id="channelSelect" class="w-full p-3 bg-[#1e1f22] rounded border border-transparent focus:border-indigo-500 outline-none text-sm transition">
                                <option>Loading...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Message Content</label>
                            <textarea id="msgInput" oninput="updatePreview()" placeholder="Type something..." class="w-full h-32 md:h-48 p-3 bg-[#1e1f22] rounded border border-transparent focus:border-indigo-500 outline-none text-sm resize-none transition"></textarea>
                        </div>
                        <button onclick="sendMsg()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded font-bold text-sm transition shadow-lg active:scale-95">
                            Send to Discord
                        </button>
                    </div>

                    <div class="w-full lg:w-80">
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2">Live Preview</label>
                        <div class="bg-[#313338] p-3 rounded shadow-md border-l-4 border-indigo-500 flex gap-3">
                            <div class="w-8 h-8 rounded-full bg-indigo-500 flex-shrink-0"></div>
                            <div class="min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="text-sm font-semibold">Bot</span>
                                    <span class="text-[9px] text-gray-400">Today at 1:00 PM</span>
                                </div>
                                <div id="preview" class="text-sm text-[#dbdee1] break-words whitespace-pre-wrap">Your message here...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="logs" class="hidden max-w-5xl mx-auto h-full flex flex-col">
                <h2 class="text-2xl font-bold mb-4">Live Message Feed</h2>
                <div id="logContainer" class="flex-1 bg-[#1a1b1e] rounded-xl p-4 font-mono text-xs overflow-y-auto space-y-2 border border-[#2b2d31]">
                    <div class="text-gray-600 italic">Listening for messages...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        
        socket.on('connect', () => socket.emit('getChannels'));

        socket.on('channelList', (channels) => {
            const select = document.getElementById('channelSelect');
            select.innerHTML = channels.map(c => `<option value="${c.id}"># ${c.name}</option>`).join('');
        });

        function updatePreview() {
            const val = document.getElementById('msgInput').value;
            document.getElementById('preview').innerText = val || "Your message here...";
        }

        function sendMsg() {
            const content = document.getElementById('msgInput').value;
            const channelId = document.getElementById('channelSelect').value;
            if(!content) return;
            socket.emit('sendMessage', { channelId, content });
            document.getElementById('msgInput').value = '';
            updatePreview();
        }

        socket.on('discordMessage', (msg) => {
            const log = document.getElementById('logContainer');
            const item = document.createElement('div');
            item.className = "border-b border-gray-800 pb-2";
            item.innerHTML = `<span class="text-indigo-400">[#${msg.channel}]</span> <span class="text-gray-400 font-bold">${msg.author}:</span> ${msg.content}`;
            log.prepend(item);
        });

        function showTab(tab) {
            document.getElementById('builder').classList.toggle('hidden', tab !== 'builder');
            document.getElementById('logs').classList.toggle('hidden', tab !== 'logs');
        }
    </script>
</body>
</html>
